name: E2E Android

on:
  workflow_dispatch:
  schedule:
    # 2h00 UTC chaque nuit
    - cron: '0 2 * * *'
  push:
    branches:
      - feat/sdk-v6-migration
    paths:
      - 'packages/purchasely/android/build.gradle'
      - 'packages/*/android/build.gradle'
      - '.github/workflows/e2e-android.yml'
      - 'integration_test/**'
      - 'example/src/E2ETestRunner.tsx'
      - 'example/android/app/build.gradle'

concurrency:
  group: e2e-android
  cancel-in-progress: true

jobs:
  e2e-android:
    name: E2E Tests (Android T1-T13)
    # ubuntu-latest: KVM disponible pour l'émulateur x86_64, rapide (~45s boot).
    # macOS sera utilisé dans e2e-ios.yml pour les tests iOS.
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      AVD_NAME: "rn_e2e_api34"
      AVD_PACKAGE: "system-images;android-34;google_apis;x86_64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Build JS SDK
        run: yarn purchasely:prepare

      - name: Build debug APK (JS bundle embedded)
        # -Pe2eBuild=true removes 'debug' from debuggableVariants so the JS bundle
        # is embedded in the APK — Metro bundler not needed in CI.
        env:
          JAVA_OPTS: "-XX:MaxHeapSize=4g"
        run: |
          cd example/android
          ./gradlew :app:assembleDebug -Pe2eBuild=true --quiet

      - name: Setup Android SDK (cmdline-tools, sdkmanager, avdmanager)
        uses: android-actions/setup-android@v4

      - name: Install system image and create AVD if needed
        run: |
          set -euo pipefail
          sdkmanager --install "$AVD_PACKAGE" || true
          sdkmanager --install "emulator" || true
          sdkmanager --install "platform-tools" || true
          if ! avdmanager list avd | grep -q "$AVD_NAME"; then
            echo "Creating AVD: $AVD_NAME"
            echo "no" | avdmanager create avd \
              --name "$AVD_NAME" \
              --package "$AVD_PACKAGE" \
              --device "pixel_6" \
              --force
          else
            echo "AVD $AVD_NAME already exists — reusing"
          fi

      - name: Start Android emulator
        run: |
          set -euo pipefail
          adb emu kill 2>/dev/null || true
          pkill -9 qemu-system 2>/dev/null || true
          sleep 2

          $ANDROID_HOME/emulator/emulator \
            -avd "$AVD_NAME" \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -no-snapshot \
            &

          adb wait-for-device

          boot_completed=""
          attempts=0
          while [ "$boot_completed" != "1" ] && [ $attempts -lt 60 ]; do
            boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)
            [ "$boot_completed" != "1" ] && sleep 5 && attempts=$((attempts + 1))
          done

          [ "$boot_completed" = "1" ] || (echo "::error::Emulator failed to boot"; exit 1)
          adb shell input keyevent 82

      - name: Disable animations
        run: |
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

      - name: Run E2E suite
        run: bash integration_test/run_e2e.sh emulator-5554 --skip-build --debug

      - name: Stop emulator
        if: always()
        run: |
          adb emu kill 2>/dev/null || true
          pkill -9 qemu-system 2>/dev/null || true

      - name: Upload logcat on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logcat-${{ github.run_id }}
          path: /tmp/e2e_rn_logcat_*.log
          retention-days: 7
